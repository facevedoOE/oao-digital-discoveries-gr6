<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 23 Activity — Predict the Branch | Digital Discoveries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;600;700;800&family=Wix+Madefor+Text:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#0a0a14;font-family:'Wix Madefor Text',system-ui,sans-serif;color:#e2e8f0;line-height:1.6;min-height:100vh;">

<div id="app-root" style="max-width:820px;margin:0 auto;padding:20px;">

  <!-- HEADER -->
  <div style="background:#0E1C42;border-radius:14px;padding:20px 24px;margin-bottom:18px;border:1px solid #1e2a4a;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;">
      <div style="background:#F78F1E;color:#0E1C42;padding:5px 12px;border-radius:14px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:11px;letter-spacing:0.14em;">🎮 ACTIVITY</div>
      <div style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;">Unit 3 · Week 23 · SC.6.PE.1.4</div>
    </div>
    <h1 style="font-family:'Wix Madefor Display',sans-serif;font-size:28px;font-weight:800;color:#ffffff;margin:0 0 6px;line-height:1.2;">Predict the Branch</h1>
    <p style="margin:0;color:#c8d6e8;font-size:14px;">10 chunks of pseudocode. For each one, look at the input value and predict which branch will run. You can retry as many times as you want.</p>
  </div>

  <!-- PROGRESS + XP BAR -->
  <div id="status-bar" style="background:#111122;border:1px solid #1e2a4a;border-radius:12px;padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
    <div style="flex:1;min-width:220px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;">Progress</span>
        <span id="progress-text" style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:13px;font-weight:700;">Question 1 of 10</span>
      </div>
      <div style="background:#0a0a14;border-radius:10px;height:10px;overflow:hidden;">
        <div id="progress-fill" style="background:linear-gradient(90deg,#55C8E8,#76C043);height:100%;width:0%;transition:width 0.4s ease;"></div>
      </div>
    </div>
    <div style="background:linear-gradient(135deg,#C7922C,#8a6620);padding:8px 16px;border-radius:10px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:18px;">⚡</span>
      <span style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;">XP</span>
      <span id="xp-text" style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:18px;font-weight:800;">0</span>
    </div>
  </div>

  <!-- QUESTION CONTAINER -->
  <div id="question-container"></div>

  <!-- FOOTER NOTE -->
  <div style="text-align:center;color:#55687a;font-size:12px;margin-top:24px;padding:12px;">
    Digital Discoveries · Optima Academy Online · Course 0200021
  </div>

</div>

<script>
// ═════════════════════════════════════════════════════════════
// QUESTION BANK — 10 conditional-prediction items
// ═════════════════════════════════════════════════════════════
const QUESTIONS = [
  {
    id: 1,
    tag: 'IF Only',
    tagColor: '#55C8E8',
    status: 'blue',
    icon: '🔀',
    scenario: "Given <code>score = 75</code>, what does this code print?",
    code: "IF score >= 80 THEN\n    PRINT \"Great!\"\nEND IF\nPRINT \"Done\"",
    options: [
      { text: '"Great!" then "Done"', correct: false, why: "75 is NOT >= 80, so the IF body is skipped. Only \"Done\" prints." },
      { text: '"Great!" only', correct: false, why: "The IF body never runs because 75 < 80, and \"Done\" is OUTSIDE the IF, so it always runs." },
      { text: '"Done" only', correct: true, why: "75 >= 80 is false, so the IF body is skipped. \"Done\" sits outside the IF, so it always prints." },
      { text: 'Nothing — the program crashes', correct: false, why: "An IF that's false isn't an error — the program simply skips the body and keeps going." }
    ]
  },
  {
    id: 2,
    tag: 'IF / ELSE',
    tagColor: '#F78F1E',
    status: 'amber',
    icon: '⚖️',
    scenario: "Given <code>age = 13</code>, which branch runs?",
    code: "IF age >= 18 THEN\n    PRINT \"adult\"\nELSE\n    PRINT \"minor\"\nEND IF",
    options: [
      { text: 'The IF branch — prints "adult"', correct: false, why: "13 is NOT >= 18, so the condition is false. The program jumps to ELSE." },
      { text: 'The ELSE branch — prints "minor"', correct: true, why: "13 >= 18 is false, so the program skips the IF body and runs the ELSE branch." },
      { text: 'Both branches run', correct: false, why: "An IF/ELSE always runs EXACTLY one branch — never both. That's the whole point of ELSE." },
      { text: 'Neither branch runs', correct: false, why: "An IF/ELSE always runs ONE branch — if the condition is false, ELSE catches it." }
    ]
  },
  {
    id: 3,
    tag: 'IF / ELIF / ELSE',
    tagColor: '#67308F',
    status: 'blue',
    icon: '🌳',
    scenario: "Given <code>grade = 72</code>, what prints?",
    code: "IF grade >= 90 THEN\n    PRINT \"A\"\nELIF grade >= 80 THEN\n    PRINT \"B\"\nELIF grade >= 70 THEN\n    PRINT \"C\"\nELSE\n    PRINT \"D or F\"\nEND IF",
    options: [
      { text: '"A"', correct: false, why: "72 is not >= 90, so the A branch is skipped." },
      { text: '"B"', correct: false, why: "72 is not >= 80, so the B branch is also skipped." },
      { text: '"C"', correct: true, why: "72 is not >= 90 or >= 80, but it IS >= 70 — so the C branch runs and the rest are skipped." },
      { text: '"D or F"', correct: false, why: "ELSE only catches values that match none of the IF/ELIF tests above. 72 matches the >= 70 ELIF first." }
    ]
  },
  {
    id: 4,
    tag: 'Operator Trip-Up',
    tagColor: '#76C043',
    status: 'red',
    icon: '🎯',
    scenario: "Given <code>height = 48</code>, what does the rider see? (The sign says: \"You must be at least 48 inches tall.\")",
    code: "IF height > 48 THEN\n    PRINT \"You can ride!\"\nELSE\n    PRINT \"Sorry, too short.\"\nEND IF",
    options: [
      { text: '"You can ride!" — 48 is at least 48', correct: false, why: "Tricky! The code uses > (greater than), not >= (greater than or equal). 48 > 48 is FALSE — they're equal, not greater." },
      { text: '"Sorry, too short." — because the operator is wrong', correct: true, why: "Exactly. 48 > 48 is false, so the ELSE runs. To match the sign's wording (\"at least 48\"), the code should use >= instead of >." },
      { text: 'Both messages', correct: false, why: "An IF/ELSE never runs both branches. It runs exactly one." },
      { text: 'The program crashes because 48 == 48', correct: false, why: "Comparing equal numbers isn't an error — it just produces false for >. The program keeps running fine." }
    ]
  },
  {
    id: 5,
    tag: '== vs =',
    tagColor: '#C7922C',
    status: 'red',
    icon: '❌',
    scenario: "What's wrong with this line of code? <code>IF lives = 0 THEN</code>",
    code: "IF lives = 0 THEN\n    PRINT \"Game Over\"\nEND IF",
    options: [
      { text: 'Nothing — single = is the right way to check equality', correct: false, why: "In code, a single = is ASSIGN, not COMPARE. To check equality you need ==." },
      { text: 'It should use == instead of = — single = assigns, double == compares', correct: true, why: "Right! lives = 0 ASSIGNS 0 to lives (changing it!). To CHECK if lives equals 0, use ==." },
      { text: 'It should use != instead of =', correct: false, why: "!= is \"not equal to\" — that's the OPPOSITE of what the programmer wants." },
      { text: 'It should use >= instead of =', correct: false, why: ">= is \"greater than or equal to.\" The bug is about == vs =, not about > vs <." }
    ]
  },
  {
    id: 6,
    tag: 'IF / ELIF / ELSE',
    tagColor: '#55C8E8',
    status: 'green',
    icon: '🚦',
    scenario: "Given <code>n = 10</code>, what prints? (Watch the operator carefully!)",
    code: "IF n > 100 THEN\n    PRINT \"huge\"\nELIF n > 10 THEN\n    PRINT \"medium\"\nELSE\n    PRINT \"small\"\nEND IF",
    options: [
      { text: '"huge"', correct: false, why: "10 is not > 100." },
      { text: '"medium"', correct: false, why: "Watch closely — 10 is NOT > 10 (greater than 10). They're equal. The condition uses > not >=, so this branch is skipped." },
      { text: '"small"', correct: true, why: "Both IF and ELIF are false (10 is not > 100, and 10 is not > 10), so the ELSE catches it. \"small\" prints." },
      { text: 'Nothing', correct: false, why: "ELSE always runs when every IF/ELIF above it is false — there's always exactly one branch that runs." }
    ]
  },
  {
    id: 7,
    tag: 'Nested IF',
    tagColor: '#67308F',
    status: 'blue',
    icon: '🧠',
    scenario: "Given <code>age = 16</code> and <code>hasLicense = true</code>, what prints?",
    code: "IF age >= 16 THEN\n    IF hasLicense == true THEN\n        PRINT \"Can drive\"\n    ELSE\n        PRINT \"Need license\"\n    END IF\nELSE\n    PRINT \"Too young\"\nEND IF",
    options: [
      { text: '"Can drive"', correct: true, why: "Outer IF: 16 >= 16 is true → enter. Inner IF: hasLicense == true → \"Can drive\" prints." },
      { text: '"Need license"', correct: false, why: "That branch only runs if hasLicense is FALSE. Here it's true." },
      { text: '"Too young"', correct: false, why: "That branch only runs when age < 16. Here age = 16, so the outer IF is true." },
      { text: 'All three messages', correct: false, why: "Nested or not, IF/ELSE always runs exactly one branch at each level." }
    ]
  },
  {
    id: 8,
    tag: '>= vs >',
    tagColor: '#F78F1E',
    status: 'amber',
    icon: '🎲',
    scenario: "Given <code>x = 5</code>, which branch runs?",
    code: "IF x >= 5 THEN\n    PRINT \"big enough\"\nELSE\n    PRINT \"too small\"\nEND IF",
    options: [
      { text: '"big enough"', correct: true, why: "5 >= 5 is TRUE (greater than OR equal to). The IF body runs." },
      { text: '"too small"', correct: false, why: "Tricky! With >= the equal case is included. 5 >= 5 is true, so ELSE is skipped." },
      { text: 'Both', correct: false, why: "IF/ELSE never runs both branches." },
      { text: 'The program errors out', correct: false, why: "Comparing equal numbers with >= is perfectly valid — it returns true." }
    ]
  },
  {
    id: 9,
    tag: 'IF / ELIF / ELSE',
    tagColor: '#76C043',
    status: 'green',
    icon: '🔍',
    scenario: "Given <code>guess = 42</code> and <code>secret = 42</code>, what prints?",
    code: "IF guess > secret THEN\n    PRINT \"too high\"\nELIF guess < secret THEN\n    PRINT \"too low\"\nELSE\n    PRINT \"got it!\"\nEND IF",
    options: [
      { text: '"too high"', correct: false, why: "42 is not > 42." },
      { text: '"too low"', correct: false, why: "42 is not < 42 either." },
      { text: '"got it!"', correct: true, why: "Both IF and ELIF are false (42 isn't greater or less than 42), so ELSE catches it. The ELSE handles the equal case." },
      { text: '"too high" and "too low"', correct: false, why: "ELIF chains run AT MOST one branch — and the first one that's true wins." }
    ]
  },
  {
    id: 10,
    tag: 'Putting It Together',
    tagColor: '#55C8E8',
    status: 'green',
    icon: '✅',
    scenario: "Given <code>temperature = 60</code>, what prints? (The boundary case!)",
    code: "IF temperature > 80 THEN\n    PRINT \"shorts\"\nELIF temperature > 60 THEN\n    PRINT \"jeans\"\nELSE\n    PRINT \"coat\"\nEND IF",
    options: [
      { text: '"shorts"', correct: false, why: "60 is not > 80." },
      { text: '"jeans"', correct: false, why: "Sneaky! 60 is NOT > 60 (greater than 60). They're equal. Use >= if you want to include 60." },
      { text: '"coat"', correct: true, why: "Both 60 > 80 and 60 > 60 are false, so the ELSE runs. To include 60 in \"jeans,\" the code would need ELIF temperature >= 60." },
      { text: 'All three messages', correct: false, why: "An IF/ELIF/ELSE chain runs exactly one branch — the first one that matches, or ELSE." }
    ]
  }
];

// ═════════════════════════════════════════════════════════════
// STATE
// ═════════════════════════════════════════════════════════════
const POINTS_PER_CORRECT = 10;
let currentIndex = 0;
let totalXP = 0;
let correctCount = 0;
let answered = false;

// ═════════════════════════════════════════════════════════════
// RENDERING
// ═════════════════════════════════════════════════════════════
const STATUS_COLORS = {
  red:   '#ff6b6b',
  amber: '#F78F1E',
  green: '#76C043',
  blue:  '#55C8E8'
};

function renderQuestion() {
  const q = QUESTIONS[currentIndex];
  answered = false;
  updateStatusBar();

  const container = document.getElementById('question-container');
  container.innerHTML = `
    <div style="background:#111122;border:1px solid #1e2a4a;border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <div style="background:linear-gradient(135deg,#0E1C42,#1a2a5e);padding:20px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #1e2a4a;">
        <div style="width:12px;height:12px;border-radius:50%;background:${STATUS_COLORS[q.status]};box-shadow:0 0 12px ${STATUS_COLORS[q.status]};flex-shrink:0;"></div>
        <div style="background:${q.tagColor};color:#0E1C42;padding:4px 10px;border-radius:10px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;">${q.tag}</div>
        <div style="margin-left:auto;font-size:28px;">${q.icon}</div>
      </div>
      <div style="padding:24px;">
        <div style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:10px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;">Scenario ${q.id}</div>
        <p style="color:#ffffff;font-size:17px;line-height:1.55;margin:0 0 14px;">${q.scenario}</p>
        <pre style="background:#0a0a14;border:1px solid #1e2a4a;border-left:3px solid #55C8E8;border-radius:8px;padding:14px 16px;margin:0 0 22px;color:#e2e8f0;font-family:'Consolas','Menlo','Courier New',monospace;font-size:13.5px;line-height:1.7;overflow-x:auto;white-space:pre;"><code>${q.code}</code></pre>
        <div id="options-list" style="display:flex;flex-direction:column;gap:10px;"></div>
        <div id="feedback-zone" style="margin-top:18px;"></div>
      </div>
    </div>
  `;

  const list = document.getElementById('options-list');
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.setAttribute('data-idx', idx);
    btn.style.cssText = `
      background:#0a0a14;border:2px solid #1e2a4a;border-radius:10px;
      padding:14px 18px;color:#e2e8f0;font-family:inherit;font-size:15px;
      text-align:left;cursor:pointer;transition:all 0.2s ease;
      display:flex;gap:12px;align-items:flex-start;
    `;
    btn.innerHTML = `
      <div style="flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#1e2a4a;color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;">${String.fromCharCode(65+idx)}</div>
      <div style="flex:1;padding-top:4px;">${opt.text}</div>
    `;
    btn.addEventListener('mouseenter', () => {
      if (!answered) { btn.style.borderColor = '#55C8E8'; btn.style.background = '#111933'; }
    });
    btn.addEventListener('mouseleave', () => {
      if (!answered) { btn.style.borderColor = '#1e2a4a'; btn.style.background = '#0a0a14'; }
    });
    btn.addEventListener('click', () => handleAnswer(idx));
    list.appendChild(btn);
  });
}

function handleAnswer(selectedIdx) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[currentIndex];
  const chosen = q.options[selectedIdx];
  const buttons = document.querySelectorAll('#options-list button');

  buttons.forEach((btn, i) => {
    btn.style.cursor = 'default';
    btn.disabled = true;
    const opt = q.options[i];
    if (opt.correct) {
      btn.style.borderColor = '#76C043';
      btn.style.background = 'rgba(118,192,67,0.12)';
      btn.querySelector('div').style.background = '#76C043';
      btn.querySelector('div').style.color = '#0E1C42';
    } else if (i === selectedIdx && !opt.correct) {
      btn.style.borderColor = '#ff6b6b';
      btn.style.background = 'rgba(255,107,107,0.10)';
      btn.querySelector('div').style.background = '#ff6b6b';
      btn.querySelector('div').style.color = '#ffffff';
    } else {
      btn.style.opacity = '0.55';
    }
  });

  if (chosen.correct) {
    totalXP += POINTS_PER_CORRECT;
    correctCount++;
  }
  updateStatusBar();

  const fb = document.getElementById('feedback-zone');
  const color = chosen.correct ? '#76C043' : '#ff6b6b';
  const bgColor = chosen.correct ? 'rgba(118,192,67,0.10)' : 'rgba(255,107,107,0.08)';
  const label = chosen.correct ? '✅ CORRECT  ·  +' + POINTS_PER_CORRECT + ' XP' : '❌ NOT QUITE';
  fb.innerHTML = `
    <div style="background:${bgColor};border:1px solid ${color};border-left:4px solid ${color};border-radius:0 10px 10px 0;padding:16px 20px;margin-bottom:14px;">
      <div style="color:${color};font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.18em;margin-bottom:8px;">${label}</div>
      <div style="color:#e2e8f0;font-size:14px;line-height:1.6;">${chosen.why}</div>
    </div>
    <button id="next-btn" style="width:100%;background:linear-gradient(135deg,#55C8E8,#0E5568);border:none;border-radius:10px;padding:14px 18px;color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s ease;">
      ${currentIndex < QUESTIONS.length - 1 ? 'Next Scenario →' : 'See Your Results →'}
    </button>
  `;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.addEventListener('mouseenter', () => { nextBtn.style.transform = 'translateY(-2px)'; nextBtn.style.boxShadow = '0 6px 20px rgba(85,200,232,0.4)'; });
  nextBtn.addEventListener('mouseleave', () => { nextBtn.style.transform = 'translateY(0)'; nextBtn.style.boxShadow = 'none'; });
  nextBtn.addEventListener('click', () => {
    currentIndex++;
    if (currentIndex < QUESTIONS.length) {
      renderQuestion();
    } else {
      renderResults();
    }
  });
}

function updateStatusBar() {
  document.getElementById('progress-text').textContent = `Question ${Math.min(currentIndex+1, QUESTIONS.length)} of ${QUESTIONS.length}`;
  const pct = ((answered ? currentIndex + 1 : currentIndex) / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('xp-text').textContent = totalXP;
}

function renderResults() {
  const maxXP = POINTS_PER_CORRECT * QUESTIONS.length;
  const pct = Math.round((totalXP / maxXP) * 100);
  let message, emoji, color;
  if (pct === 100) {
    message = "Branch master! You can read any conditional and predict the outcome — you're ready for loops next.";
    emoji = "🏆"; color = "#C7922C";
  } else if (pct >= 80) {
    message = "Excellent work! You've got the IF/ELIF/ELSE pattern down. Watch those > vs >= operators on the borderline cases.";
    emoji = "⭐"; color = "#76C043";
  } else if (pct >= 60) {
    message = "Good progress. Review the scenarios you missed — most slip-ups are about > vs >= or skipping a branch by accident.";
    emoji = "💪"; color = "#55C8E8";
  } else {
    message = "Keep going! Re-read the Week 23 lesson on comparison operators and the conditional tracer, then try again.";
    emoji = "📚"; color = "#67308F";
  }

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-text').textContent = 'Complete!';

  document.getElementById('question-container').innerHTML = `
    <div style="background:linear-gradient(135deg,#111122,#0E1C42);border:1px solid ${color};border-radius:14px;padding:36px 28px;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,0.5);">
      <div style="font-size:72px;margin-bottom:12px;">${emoji}</div>
      <div style="color:${color};font-family:'Wix Madefor Display',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.24em;text-transform:uppercase;margin-bottom:10px;">Activity Complete</div>
      <h2 style="font-family:'Wix Madefor Display',sans-serif;color:#ffffff;font-size:32px;font-weight:800;margin:0 0 8px;">${totalXP} / ${maxXP} XP</h2>
      <div style="color:#c8d6e8;font-size:16px;margin-bottom:6px;">${correctCount} of ${QUESTIONS.length} correct · ${pct}%</div>
      <p style="color:#e2e8f0;font-size:16px;line-height:1.55;max-width:520px;margin:16px auto 28px;">${message}</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button id="retry-btn" style="background:linear-gradient(135deg,#55C8E8,#0E5568);border:none;border-radius:10px;padding:14px 26px;color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:14px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:transform 0.2s;">
          ↻ Try Again
        </button>
      </div>
    </div>
  `;

  document.getElementById('retry-btn').addEventListener('click', () => {
    currentIndex = 0; totalXP = 0; correctCount = 0;
    renderQuestion();
  });

  // Canvas grade passback via postMessage
  try {
    window.parent.postMessage({
      type: 'canvas-grade',
      score: totalXP,
      maxScore: maxXP,
      percent: pct,
      correctCount: correctCount,
      totalQuestions: QUESTIONS.length,
      activity: 'week-23-activity'
    }, '*');
  } catch (e) { /* no-op */ }
}

// Kick off
renderQuestion();
</script>

</body>
</html>
