<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 26 Activity — Bug Hunter | Digital Discoveries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;600;700;800&family=Wix+Madefor+Text:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#0a0a14;font-family:'Wix Madefor Text',system-ui,sans-serif;color:#e2e8f0;line-height:1.6;min-height:100vh;">

<div id="app-root" style="max-width:820px;margin:0 auto;padding:20px;">

  <!-- HEADER -->
  <div style="background:#0E1C42;border-radius:14px;padding:20px 24px;margin-bottom:18px;border:1px solid #1e2a4a;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;">
      <div style="background:#F78F1E;color:#0E1C42;padding:5px 12px;border-radius:14px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:11px;letter-spacing:0.14em;">🐛 ACTIVITY</div>
      <div style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;">Unit 3 · Week 26 · SC.6.PE.3.5 · 3.6 · 4.1</div>
    </div>
    <h1 style="font-family:'Wix Madefor Display',sans-serif;font-size:28px;font-weight:800;color:#ffffff;margin:0 0 6px;line-height:1.2;">Bug Hunter</h1>
    <p style="margin:0;color:#c8d6e8;font-size:14px;">10 debugging scenarios. Classify bugs, pick strategies, identify lifecycle phases, and earn XP. Retry as many times as you want.</p>
  </div>

  <!-- PROGRESS + XP BAR -->
  <div id="status-bar" style="background:#111122;border:1px solid #1e2a4a;border-radius:12px;padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
    <div style="flex:1;min-width:220px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;">Progress</span>
        <span id="progress-text" style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:13px;font-weight:700;">Question 1 of 10</span>
      </div>
      <div style="background:#0a0a14;border-radius:10px;height:10px;overflow:hidden;">
        <div id="progress-fill" style="background:linear-gradient(90deg,#55C8E8,#76C043);height:100%;width:0%;transition:width 0.4s ease;"></div>
      </div>
    </div>
    <div style="background:linear-gradient(135deg,#C7922C,#8a6620);padding:8px 16px;border-radius:10px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:18px;">⚡</span>
      <span style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;">XP</span>
      <span id="xp-text" style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:18px;font-weight:800;">0</span>
    </div>
  </div>

  <!-- QUESTION CONTAINER -->
  <div id="question-container"></div>

  <!-- FOOTER NOTE -->
  <div style="text-align:center;color:#55687a;font-size:12px;margin-top:24px;padding:12px;">
    Digital Discoveries · Optima Academy Online · Course 0200021
  </div>

</div>

<script>
// ═════════════════════════════════════════════════════════════
// QUESTION BANK — 10 debugging / lifecycle scenarios
// ═════════════════════════════════════════════════════════════
const QUESTIONS = [
  {
    id: 1,
    tag: 'Classify the Bug',
    tagColor: '#55C8E8',
    status: 'blue',
    icon: '🐛',
    scenario: "A student writes <code>if score &gt; 90</code> (no colon!). Python refuses to run the file at all and prints <em>SyntaxError</em>. What kind of bug is this?",
    options: [
      { text: 'Logic error — the math is wrong', correct: false, why: "Logic errors run without crashing — but here the program won't even start. That points to a different family." },
      { text: 'Runtime error — it crashed mid-run', correct: false, why: "Runtime errors crash <em>during</em> execution, after the program has started. This one never even got to start." },
      { text: 'Syntax error — the grammar of the language was broken', correct: true, why: "Spot on. Missing punctuation, brackets, or keywords are syntax errors. Python catches them BEFORE running the program." },
      { text: 'Hardware error — the computer is broken', correct: false, why: "The computer is fine. The CODE has the bug — and the kind that breaks language grammar is a syntax error." }
    ]
  },
  {
    id: 2,
    tag: 'Classify the Bug',
    tagColor: '#F78F1E',
    status: 'amber',
    icon: '🔍',
    scenario: "A program runs without any error message but prints that the average of 80, 90, and 100 is <strong>203.33</strong>. What kind of bug is this?",
    options: [
      { text: 'Syntax error — the grammar was broken', correct: false, why: "The program ran successfully, so the grammar was fine. Syntax errors stop programs before they start." },
      { text: 'Runtime error — the program crashed', correct: false, why: "It didn't crash — it printed an answer. A wrong answer, but no crash. Runtime errors halt the program." },
      { text: 'Logic error — the program ran but gave the wrong answer', correct: true, why: "Classic logic error — most likely missing parentheses around the addition. The computer did exactly what it was told. The bug was in WHAT it was told." },
      { text: 'Network error — the internet failed', correct: false, why: "No network is involved. The bug is in the math itself — that's a logic problem." }
    ]
  },
  {
    id: 3,
    tag: 'Classify the Bug',
    tagColor: '#67308F',
    status: 'red',
    icon: '🐛',
    scenario: "A program works perfectly… until a user enters <code>0</code> as the number of students. Then it crashes with <em>ZeroDivisionError</em>. What kind of bug is this?",
    options: [
      { text: 'Syntax error', correct: false, why: "The program ran most of the time — syntax errors stop it before any of the code runs." },
      { text: 'Logic error', correct: false, why: "Logic errors run without crashing. This program crashes — it just took a special input to trigger it." },
      { text: 'Runtime error — only crashes with certain inputs', correct: true, why: "Yes! Runtime errors hide until the program meets the wrong real-world input. Dividing by zero is the textbook example." },
      { text: 'Compile error', correct: false, why: "Python doesn't have separate \"compile errors\" in the way some languages do — and the program clearly compiled and ran. The crash happened DURING the run = runtime." }
    ]
  },
  {
    id: 4,
    tag: 'Best First Step',
    tagColor: '#76C043',
    status: 'blue',
    icon: '📝',
    scenario: "Your program prints <strong>nothing at all</strong> — no message, no error. You're stumped. What's the BEST first move from your debugging toolbox?",
    options: [
      { text: 'Delete the whole program and start over', correct: false, why: "Almost never the right answer! You'd lose the working parts and probably re-create the same bug." },
      { text: 'Add print statements to peek inside and see what the variables actually hold', correct: true, why: "Right move. When the computer is silent, you ask it to TALK by adding print statements. You'll quickly spot where the data goes wrong." },
      { text: 'Email your teacher', correct: false, why: "Eventually maybe — but try the toolbox first! Programmers solve most problems on their own with the four moves." },
      { text: 'Restart your computer', correct: false, why: "Restarting won't fix the bug — the bug is in your CODE, not in your computer." }
    ]
  },
  {
    id: 5,
    tag: 'Best First Step',
    tagColor: '#C7922C',
    status: 'amber',
    icon: '🦆',
    scenario: "You've been staring at the same broken loop for 20 minutes. You THINK you know what each line does, but the loop still misbehaves. What's the smartest next move?",
    options: [
      { text: 'Stare at it for 20 more minutes — really hard', correct: false, why: "If looking didn't work, more looking won't help. Time to change strategy." },
      { text: 'Rewrite the whole program in a different language', correct: false, why: "That would take 10x longer — and you'd probably re-invent the same bug." },
      { text: 'Rubber-duck it: explain each line out loud to a duck (or any object)', correct: true, why: "Yes! Saying \"line 1 does X, line 2 does Y…\" forces you to slow down — and your brain spots the lie in your own assumptions." },
      { text: 'Skip the bug and pretend it doesn\'t exist', correct: false, why: "Bugs you ignore become the bugs your USERS find. Always better to track them down." }
    ]
  },
  {
    id: 6,
    tag: 'Best First Step',
    tagColor: '#55C8E8',
    status: 'red',
    icon: '🔍',
    scenario: "Your program crashes and Python prints: <code>NameError: name 'scor' is not defined — line 14</code>. What is the BEST first thing to do?",
    options: [
      { text: 'Read the error message — it tells you exactly what and where', correct: true, why: "Always step 1. The message names the variable (<code>scor</code>) and the line (14). Looks like a typo — should be <code>score</code>. Fix takes 5 seconds." },
      { text: 'Comment out half your program', correct: false, why: "That's move 4 — useful when you have NO idea where the bug is. Here the message already told you. Save the heavy tools for when you need them." },
      { text: 'Rubber-duck it for 10 minutes', correct: false, why: "Save the duck for trickier bugs. When the error message points right at the line, just read it!" },
      { text: 'Add 50 print statements', correct: false, why: "Overkill — the error message already pinned down the bug. Use prints when the computer ISN'T helping you." }
    ]
  },
  {
    id: 7,
    tag: 'Lifecycle Phase',
    tagColor: '#67308F',
    status: 'blue',
    icon: '🏗️',
    scenario: "A team writes down: <em>\"Our app will help students keep track of homework. The audience is grades 6–8. We need due-date reminders, a subject filter, and a streak counter.\"</em> No code yet. Which lifecycle phase is this?",
    options: [
      { text: 'Code', correct: false, why: "No code is being written here — they're just deciding WHAT to build." },
      { text: 'Plan — defining the problem, audience, and feature list', correct: true, why: "Exactly. Planning happens BEFORE designing or coding. You decide what problem you're solving and for whom." },
      { text: 'Deploy', correct: false, why: "Deploying means shipping to real users. Nothing has been built yet, so there's nothing to ship." },
      { text: 'Maintain', correct: false, why: "Maintenance happens AFTER the software has been used by real people. We're at the very beginning here." }
    ]
  },
  {
    id: 8,
    tag: 'Lifecycle Phase',
    tagColor: '#F78F1E',
    status: 'green',
    icon: '⚙️',
    scenario: "After the app launched, students kept reporting bugs and asking for new features. The team fixes a glitch in the streak counter and ships a small update. Which lifecycle phase is this?",
    options: [
      { text: 'Plan', correct: false, why: "Planning is the very FIRST phase — figuring out what to build. This team is fixing what they already built." },
      { text: 'Test — they\'re trying the program for the first time', correct: false, why: "Testing happens BEFORE launch, when the team is still hunting bugs internally. This bug came from real users after launch." },
      { text: 'Maintain — fixing bugs and improving software after deploy', correct: true, why: "Right. Once software is in users' hands, the maintain phase keeps it healthy: bug fixes, updates, new features." },
      { text: 'Design', correct: false, why: "Design happens before coding, when sketches and blueprints get made. The program is already coded and live here." }
    ]
  },
  {
    id: 9,
    tag: 'Iteration',
    tagColor: '#76C043',
    status: 'amber',
    icon: '🔁',
    scenario: "Minecraft launched in 2009 with just blocks and a world to walk in. Today it has villages, mobs, the Nether, redstone, and dozens of biomes. None of those were in version 1. What does this BEST illustrate?",
    options: [
      { text: 'A syntax error — the original code was broken', correct: false, why: "Nothing was broken — version 1 worked fine. It was just SMALL. The story is about how the game grew." },
      { text: 'Iteration — the team built a small version, learned, and improved it again and again', correct: true, why: "Exactly. Iteration is the heart of the lifecycle. Real software grows over many small cycles, not one giant launch." },
      { text: 'A runtime error — the game crashed', correct: false, why: "No crash is described. The story is about updates and growth over time." },
      { text: 'Plan phase — the team planned everything in advance', correct: false, why: "The opposite — none of those features existed in 2009. The team didn't plan them all up front; they ADDED them through iteration." }
    ]
  },
  {
    id: 10,
    tag: 'Rubber-Duck',
    tagColor: '#C7922C',
    status: 'green',
    icon: '🦆',
    scenario: "You're stuck. You start telling your stuffed dinosaur, line by line, what your code is supposed to do. Halfway through, you say <em>\"…and then it adds the score…\"</em> and you suddenly realize you wrote <code>-</code> instead of <code>+</code>. Why did rubber-ducking work?",
    options: [
      { text: 'The dinosaur magically fixed the bug', correct: false, why: "Sadly the dinosaur is just a witness! The fix came from YOUR brain when you slowed down to explain." },
      { text: 'Talking out loud forced your brain to slow down and check assumptions you were skipping', correct: true, why: "Exactly. When you explain in plain English, you can't gloss over your assumptions — and that's where bugs hide." },
      { text: 'It restarted your computer', correct: false, why: "Restarting wasn't part of the story — and it wouldn't have caught a typo bug anyway." },
      { text: 'It deleted the bad code automatically', correct: false, why: "No code was deleted by anyone except you. The duck just helped you see what was there." }
    ]
  }
];

// ═════════════════════════════════════════════════════════════
// STATE
// ═════════════════════════════════════════════════════════════
const POINTS_PER_CORRECT = 10;
let currentIndex = 0;
let totalXP = 0;
let correctCount = 0;
let answered = false;

// ═════════════════════════════════════════════════════════════
// RENDERING
// ═════════════════════════════════════════════════════════════
const STATUS_COLORS = {
  red:   '#ff6b6b',
  amber: '#F78F1E',
  green: '#76C043',
  blue:  '#55C8E8'
};

function renderQuestion() {
  const q = QUESTIONS[currentIndex];
  answered = false;
  updateStatusBar();

  const container = document.getElementById('question-container');
  container.innerHTML = `
    <div style="background:#111122;border:1px solid #1e2a4a;border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <div style="background:linear-gradient(135deg,#0E1C42,#1a2a5e);padding:20px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #1e2a4a;">
        <div style="width:12px;height:12px;border-radius:50%;background:${STATUS_COLORS[q.status]};box-shadow:0 0 12px ${STATUS_COLORS[q.status]};flex-shrink:0;"></div>
        <div style="background:${q.tagColor};color:#0E1C42;padding:4px 10px;border-radius:10px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;">${q.tag}</div>
        <div style="margin-left:auto;font-size:28px;">${q.icon}</div>
      </div>
      <div style="padding:24px;">
        <div style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:10px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;">Scenario ${q.id}</div>
        <p style="color:#ffffff;font-size:17px;line-height:1.55;margin:0 0 22px;">${q.scenario}</p>
        <div id="options-list" style="display:flex;flex-direction:column;gap:10px;"></div>
        <div id="feedback-zone" style="margin-top:18px;"></div>
      </div>
    </div>
  `;

  const list = document.getElementById('options-list');
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.setAttribute('data-idx', idx);
    btn.style.cssText = `
      background:#0a0a14;border:2px solid #1e2a4a;border-radius:10px;
      padding:14px 18px;color:#e2e8f0;font-family:inherit;font-size:15px;
      text-align:left;cursor:pointer;transition:all 0.2s ease;
      display:flex;gap:12px;align-items:flex-start;
    `;
    btn.innerHTML = `
      <div style="flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#1e2a4a;color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;">${String.fromCharCode(65+idx)}</div>
      <div style="flex:1;padding-top:4px;">${opt.text}</div>
    `;
    btn.addEventListener('mouseenter', () => {
      if (!answered) { btn.style.borderColor = '#55C8E8'; btn.style.background = '#111933'; }
    });
    btn.addEventListener('mouseleave', () => {
      if (!answered) { btn.style.borderColor = '#1e2a4a'; btn.style.background = '#0a0a14'; }
    });
    btn.addEventListener('click', () => handleAnswer(idx));
    list.appendChild(btn);
  });
}

function handleAnswer(selectedIdx) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[currentIndex];
  const chosen = q.options[selectedIdx];
  const buttons = document.querySelectorAll('#options-list button');

  buttons.forEach((btn, i) => {
    btn.style.cursor = 'default';
    btn.disabled = true;
    const opt = q.options[i];
    if (opt.correct) {
      btn.style.borderColor = '#76C043';
      btn.style.background = 'rgba(118,192,67,0.12)';
      btn.querySelector('div').style.background = '#76C043';
      btn.querySelector('div').style.color = '#0E1C42';
    } else if (i === selectedIdx && !opt.correct) {
      btn.style.borderColor = '#ff6b6b';
      btn.style.background = 'rgba(255,107,107,0.10)';
      btn.querySelector('div').style.background = '#ff6b6b';
      btn.querySelector('div').style.color = '#ffffff';
    } else {
      btn.style.opacity = '0.55';
    }
  });

  if (chosen.correct) {
    totalXP += POINTS_PER_CORRECT;
    correctCount++;
  }
  updateStatusBar();

  const fb = document.getElementById('feedback-zone');
  const color = chosen.correct ? '#76C043' : '#ff6b6b';
  const bgColor = chosen.correct ? 'rgba(118,192,67,0.10)' : 'rgba(255,107,107,0.08)';
  const label = chosen.correct ? '✅ CORRECT  ·  +' + POINTS_PER_CORRECT + ' XP' : '❌ NOT QUITE';
  fb.innerHTML = `
    <div style="background:${bgColor};border:1px solid ${color};border-left:4px solid ${color};border-radius:0 10px 10px 0;padding:16px 20px;margin-bottom:14px;">
      <div style="color:${color};font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.18em;margin-bottom:8px;">${label}</div>
      <div style="color:#e2e8f0;font-size:14px;line-height:1.6;">${chosen.why}</div>
    </div>
    <button id="next-btn" style="width:100%;background:linear-gradient(135deg,#55C8E8,#0E5568);border:none;border-radius:10px;padding:14px 18px;color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s ease;">
      ${currentIndex < QUESTIONS.length - 1 ? 'Next Scenario →' : 'See Your Results →'}
    </button>
  `;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.addEventListener('mouseenter', () => { nextBtn.style.transform = 'translateY(-2px)'; nextBtn.style.boxShadow = '0 6px 20px rgba(85,200,232,0.4)'; });
  nextBtn.addEventListener('mouseleave', () => { nextBtn.style.transform = 'translateY(0)'; nextBtn.style.boxShadow = 'none'; });
  nextBtn.addEventListener('click', () => {
    currentIndex++;
    if (currentIndex < QUESTIONS.length) {
      renderQuestion();
    } else {
      renderResults();
    }
  });
}

function updateStatusBar() {
  document.getElementById('progress-text').textContent = `Question ${Math.min(currentIndex+1, QUESTIONS.length)} of ${QUESTIONS.length}`;
  const pct = ((answered ? currentIndex + 1 : currentIndex) / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('xp-text').textContent = totalXP;
}

function renderResults() {
  const maxXP = POINTS_PER_CORRECT * QUESTIONS.length;
  const pct = Math.round((totalXP / maxXP) * 100);
  let message, emoji, color;
  if (pct === 100) {
    message = "Perfect debugging! You can spot a syntax error from across the room.";
    emoji = "🏆"; color = "#C7922C";
  } else if (pct >= 80) {
    message = "Excellent bug-hunting! You know your toolbox and the lifecycle cold.";
    emoji = "⭐"; color = "#76C043";
  } else if (pct >= 60) {
    message = "Solid progress. Review the scenarios you missed and try again.";
    emoji = "💪"; color = "#55C8E8";
  } else {
    message = "Keep going — re-read the Week 26 lesson and run through the bugs again.";
    emoji = "📚"; color = "#67308F";
  }

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-text').textContent = 'Complete!';

  document.getElementById('question-container').innerHTML = `
    <div style="background:linear-gradient(135deg,#111122,#0E1C42);border:1px solid ${color};border-radius:14px;padding:36px 28px;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,0.5);">
      <div style="font-size:72px;margin-bottom:12px;">${emoji}</div>
      <div style="color:${color};font-family:'Wix Madefor Display',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.24em;text-transform:uppercase;margin-bottom:10px;">Activity Complete</div>
      <h2 style="font-family:'Wix Madefor Display',sans-serif;color:#ffffff;font-size:32px;font-weight:800;margin:0 0 8px;">${totalXP} / ${maxXP} XP</h2>
      <div style="color:#c8d6e8;font-size:16px;margin-bottom:6px;">${correctCount} of ${QUESTIONS.length} correct · ${pct}%</div>
      <p style="color:#e2e8f0;font-size:16px;line-height:1.55;max-width:520px;margin:16px auto 28px;">${message}</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button id="retry-btn" style="background:linear-gradient(135deg,#55C8E8,#0E5568);border:none;border-radius:10px;padding:14px 26px;color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:14px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:transform 0.2s;">
          ↻ Try Again
        </button>
      </div>
    </div>
  `;

  document.getElementById('retry-btn').addEventListener('click', () => {
    currentIndex = 0; totalXP = 0; correctCount = 0;
    renderQuestion();
  });

  // Canvas grade passback via postMessage
  try {
    window.parent.postMessage({
      type: 'canvas-grade',
      score: totalXP,
      maxScore: maxXP,
      percent: pct,
      correctCount: correctCount,
      totalQuestions: QUESTIONS.length,
      activity: 'week-26-activity'
    }, '*');
  } catch (e) { /* no-op */ }
}

// Kick off
renderQuestion();
</script>

</body>
</html>
