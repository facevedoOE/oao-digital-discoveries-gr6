<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 21 Activity — Type Detective | Digital Discoveries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;600;700;800&family=Wix+Madefor+Text:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#0a0a14;font-family:'Wix Madefor Text',system-ui,sans-serif;color:#e2e8f0;line-height:1.6;min-height:100vh;">

<div id="app-root" style="max-width:820px;margin:0 auto;padding:20px;">

  <!-- HEADER -->
  <div style="background:#0E1C42;border-radius:14px;padding:20px 24px;margin-bottom:18px;border:1px solid #1e2a4a;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;">
      <div style="background:#F78F1E;color:#0E1C42;padding:5px 12px;border-radius:14px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:11px;letter-spacing:0.14em;">🐍 ACTIVITY</div>
      <div style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;">Unit 3 · Week 21 · SC.6.PE.1.1</div>
    </div>
    <h1 style="font-family:'Wix Madefor Display',sans-serif;font-size:28px;font-weight:800;color:#ffffff;margin:0 0 6px;line-height:1.2;">Type Detective</h1>
    <p style="margin:0;color:#c8d6e8;font-size:14px;">10 Python puzzles. Pick the right data type, the best variable name, or predict what Python will do. Earn XP — retry as many times as you like.</p>
  </div>

  <!-- PROGRESS + XP BAR -->
  <div id="status-bar" style="background:#111122;border:1px solid #1e2a4a;border-radius:12px;padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
    <div style="flex:1;min-width:220px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;">Progress</span>
        <span id="progress-text" style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:13px;font-weight:700;">Question 1 of 10</span>
      </div>
      <div style="background:#0a0a14;border-radius:10px;height:10px;overflow:hidden;">
        <div id="progress-fill" style="background:linear-gradient(90deg,#55C8E8,#76C043);height:100%;width:0%;transition:width 0.4s ease;"></div>
      </div>
    </div>
    <div style="background:linear-gradient(135deg,#C7922C,#8a6620);padding:8px 16px;border-radius:10px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:18px;">⚡</span>
      <span style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;">XP</span>
      <span id="xp-text" style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:18px;font-weight:800;">0</span>
    </div>
  </div>

  <!-- QUESTION CONTAINER -->
  <div id="question-container"></div>

  <!-- FOOTER NOTE -->
  <div style="text-align:center;color:#55687a;font-size:12px;margin-top:24px;padding:12px;">
    Digital Discoveries · Optima Academy Online · Course 0200021
  </div>

</div>

<script>
// ═════════════════════════════════════════════════════════════
// QUESTION BANK — 10 Python type/variable puzzles
// ═════════════════════════════════════════════════════════════
const QUESTIONS = [
  {
    id: 1,
    tag: 'Pick the Type',
    tagColor: '#55C8E8',
    status: 'blue',
    icon: '🎮',
    scenario: "You're storing a player's username in a Python variable. Which data type fits BEST?",
    options: [
      { text: 'int', correct: false, why: "ints are for whole numbers. A username has letters in it — it's text." },
      { text: 'float', correct: false, why: "floats are for decimal numbers like 3.14. A username isn't a number at all." },
      { text: 'string', correct: true, why: "Right! A username is text — letters, digits, maybe an underscore. Wrap it in quotes and Python stores it as a string." },
      { text: 'bool', correct: false, why: "bools only hold True or False. A username has way more possibilities than two." }
    ]
  },
  {
    id: 2,
    tag: 'Pick the Type',
    tagColor: '#F78F1E',
    status: 'amber',
    icon: '💯',
    scenario: "A character in a video game has 100 health points. Health goes up and down by whole numbers. Which data type fits BEST?",
    options: [
      { text: 'string', correct: false, why: "Strings can't be added or subtracted like numbers. You need a numeric type." },
      { text: 'int', correct: true, why: "Health goes up and down in whole numbers — perfect for an int. No decimals needed." },
      { text: 'float', correct: false, why: "Floats work, but they're overkill. Whole numbers like 100, 99, 75 fit cleanly into an int." },
      { text: 'bool', correct: false, why: "Health is more than two values, so bool can't hold it. (A True/False alive flag, on the other hand, IS a bool.)" }
    ]
  },
  {
    id: 3,
    tag: 'Pick the Type',
    tagColor: '#67308F',
    status: 'purple',
    icon: '🎯',
    scenario: '"Is the door locked?" needs to be stored in a variable. Which type fits BEST?',
    options: [
      { text: 'bool', correct: true, why: "Yes/no questions are exactly what bools were built for. is_door_locked = True or False — done." },
      { text: 'string', correct: false, why: "You COULD store \"yes\" or \"no\" in a string, but bool is purpose-built for two-state values and easier to check." },
      { text: 'int', correct: false, why: "ints work for whole numbers, not yes/no answers. Use a bool." },
      { text: 'float', correct: false, why: "Floats are for decimal numbers. A locked door isn't half-locked." }
    ]
  },
  {
    id: 4,
    tag: 'Pick the Type',
    tagColor: '#76C043',
    status: 'green',
    icon: '🔢',
    scenario: "An item's price in dollars and cents — say, $9.99 — needs a Python variable. Which data type fits BEST?",
    options: [
      { text: 'int', correct: false, why: "ints can't hold the .99 part. You'd lose the cents." },
      { text: 'float', correct: true, why: "Money with cents needs a decimal point — 9.99 is a float. (Real apps sometimes use a special money type, but for this class, float is the answer.)" },
      { text: 'string', correct: false, why: "You CAN store \"$9.99\" as a string, but then Python can't add or compare prices like numbers." },
      { text: 'bool', correct: false, why: "A price has way more than two possible values — it can't be a bool." }
    ]
  },
  {
    id: 5,
    tag: 'Variable Naming',
    tagColor: '#C7922C',
    status: 'gold',
    icon: '📝',
    scenario: "You're storing a player's high score. Which is the BEST variable name?",
    options: [
      { text: 'x', correct: false, why: "Six months from now, neither you nor anyone else will remember what 'x' holds. Be descriptive." },
      { text: 'HighScore', correct: false, why: "Python style is lowercase_with_underscores (snake_case). HighScore is the rule for languages like Java, not Python." },
      { text: 'high_score', correct: true, why: "Lowercase, underscore between words, describes the contents — this is exactly the Python community's snake_case style." },
      { text: 'high-score', correct: false, why: "Hyphens aren't allowed in Python variable names. Python would think you meant 'high MINUS score'." }
    ]
  },
  {
    id: 6,
    tag: 'Predict type()',
    tagColor: '#55C8E8',
    status: 'blue',
    icon: '🔍',
    scenario: 'In Python, what does type("3.14") return? (Notice the quotes!)',
    options: [
      { text: "<class 'float'>", correct: false, why: "Without the quotes it would be a float. With the quotes, it's text — Python doesn't peek inside to see if the characters happen to look like a number." },
      { text: "<class 'int'>", correct: false, why: "ints are whole numbers. \"3.14\" with quotes is text, and even without quotes 3.14 wouldn't be an int either." },
      { text: "<class 'str'>", correct: true, why: 'The quotes are the giveaway. Anything inside quotes is a <strong>string</strong> (str), even if it looks like a number.' },
      { text: "<class 'bool'>", correct: false, why: 'bool only holds True or False. "3.14" is neither.' }
    ]
  },
  {
    id: 7,
    tag: 'Predict the Output',
    tagColor: '#F78F1E',
    status: 'amber',
    icon: '🧪',
    scenario: 'Python runs:\n\nx = "Py"\ny = "thon"\nprint(x + y)\n\nWhat appears on the screen?',
    options: [
      { text: 'Py thon (with a space)', correct: false, why: "Python doesn't add spaces between strings when you use +. The strings stick together exactly as they are." },
      { text: 'Python', correct: true, why: 'When you use + between two strings, Python <em>concatenates</em> them — sticks them end-to-end with no space. "Py" + "thon" → "Python".' },
      { text: 'An error — you can\'t add strings', correct: false, why: 'You absolutely can! For strings, + means "join together" rather than "add up numerically".' },
      { text: 'Py+thon', correct: false, why: 'The + symbol disappears in the result. It tells Python what to do; it doesn\'t appear in the output.' }
    ]
  },
  {
    id: 8,
    tag: 'Identify the Type',
    tagColor: '#67308F',
    status: 'purple',
    icon: '🐞',
    scenario: 'Look at this Python literal: False\n\nWhat data type is it?',
    options: [
      { text: 'string', correct: false, why: 'No quotes, so it\'s not a string. "False" with quotes WOULD be a string — capital letters and all.' },
      { text: 'int', correct: false, why: "False isn't a whole number — it's a special yes/no value." },
      { text: 'bool', correct: true, why: "False (capital F, no quotes) is one of the two valid bool values, alongside True. Bools handle yes/no decisions." },
      { text: 'float', correct: false, why: "Floats are decimal numbers. False isn't a number at all." }
    ]
  },
  {
    id: 9,
    tag: 'Predict type()',
    tagColor: '#76C043',
    status: 'green',
    icon: '✅',
    scenario: 'Python runs:\n\nlevel = 7\nprint(type(level))\n\nWhat does it display?',
    options: [
      { text: "<class 'str'>", correct: false, why: "There are no quotes around 7, so it isn't a string." },
      { text: "<class 'float'>", correct: false, why: "There's no decimal point in 7. It's a whole number." },
      { text: "<class 'int'>", correct: true, why: "level holds the whole number 7 — that's an int. type() reports the type of whatever's inside the variable." },
      { text: "<class 'bool'>", correct: false, why: "7 isn't True or False, so it isn't a bool." }
    ]
  },
  {
    id: 10,
    tag: 'Variable Naming',
    tagColor: '#C7922C',
    status: 'gold',
    icon: '🐍',
    scenario: "Which of these Python variable names follows BOTH the hard rules (Python won't reject it) AND the community's snake_case style?",
    options: [
      { text: '2_lives_left', correct: false, why: 'Hard rule violation — variable names can\'t START with a digit. Python rejects this outright.' },
      { text: 'livesLeft', correct: false, why: 'Legal Python, but breaks community style. Python prefers lowercase_with_underscores (snake_case), not camelCase.' },
      { text: 'lives_left', correct: true, why: "Lowercase, underscore between words, descriptive — perfect snake_case. This is the Python community's preferred style." },
      { text: 'lives left', correct: false, why: "Hard rule violation — Python variables can't contain spaces. Use an underscore instead." }
    ]
  }
];

// ═════════════════════════════════════════════════════════════
// STATE
// ═════════════════════════════════════════════════════════════
const POINTS_PER_CORRECT = 10;
let currentIndex = 0;
let totalXP = 0;
let correctCount = 0;
let answered = false;

// ═════════════════════════════════════════════════════════════
// RENDERING
// ═════════════════════════════════════════════════════════════
const STATUS_COLORS = {
  red:    '#ff6b6b',
  amber:  '#F78F1E',
  green:  '#76C043',
  blue:   '#55C8E8',
  purple: '#A53E97',
  gold:   '#C7922C'
};

function renderQuestion() {
  const q = QUESTIONS[currentIndex];
  answered = false;
  updateStatusBar();

  const container = document.getElementById('question-container');
  container.innerHTML = `
    <div style="background:#111122;border:1px solid #1e2a4a;border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <div style="background:linear-gradient(135deg,#0E1C42,#1a2a5e);padding:20px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #1e2a4a;">
        <div style="width:12px;height:12px;border-radius:50%;background:${STATUS_COLORS[q.status]};box-shadow:0 0 12px ${STATUS_COLORS[q.status]};flex-shrink:0;"></div>
        <div style="background:${q.tagColor};color:#0E1C42;padding:4px 10px;border-radius:10px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;">${q.tag}</div>
        <div style="margin-left:auto;font-size:28px;">${q.icon}</div>
      </div>
      <div style="padding:24px;">
        <div style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:10px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;">Puzzle ${q.id}</div>
        <p style="color:#ffffff;font-size:17px;line-height:1.55;margin:0 0 22px;white-space:pre-wrap;font-family:${q.scenario.includes('=') || q.scenario.includes('print(') ? "'Consolas','Menlo',monospace" : 'inherit'};">${q.scenario}</p>
        <div id="options-list" style="display:flex;flex-direction:column;gap:10px;"></div>
        <div id="feedback-zone" style="margin-top:18px;"></div>
      </div>
    </div>
  `;

  const list = document.getElementById('options-list');
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.setAttribute('data-idx', idx);
    btn.style.cssText = `
      background:#0a0a14;border:2px solid #1e2a4a;border-radius:10px;
      padding:14px 18px;color:#e2e8f0;font-family:inherit;font-size:15px;
      text-align:left;cursor:pointer;transition:all 0.2s ease;
      display:flex;gap:12px;align-items:flex-start;
    `;
    btn.innerHTML = `
      <div style="flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#1e2a4a;color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;">${String.fromCharCode(65+idx)}</div>
      <div style="flex:1;padding-top:4px;font-family:${opt.text.includes('<class') || opt.text.startsWith('"') || opt.text.includes('_') || opt.text.length < 16 ? "'Consolas','Menlo',monospace" : 'inherit'};">${opt.text}</div>
    `;
    btn.addEventListener('mouseenter', () => {
      if (!answered) { btn.style.borderColor = '#55C8E8'; btn.style.background = '#111933'; }
    });
    btn.addEventListener('mouseleave', () => {
      if (!answered) { btn.style.borderColor = '#1e2a4a'; btn.style.background = '#0a0a14'; }
    });
    btn.addEventListener('click', () => handleAnswer(idx));
    list.appendChild(btn);
  });
}

function handleAnswer(selectedIdx) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[currentIndex];
  const chosen = q.options[selectedIdx];
  const buttons = document.querySelectorAll('#options-list button');

  buttons.forEach((btn, i) => {
    btn.style.cursor = 'default';
    btn.disabled = true;
    const opt = q.options[i];
    if (opt.correct) {
      btn.style.borderColor = '#76C043';
      btn.style.background = 'rgba(118,192,67,0.12)';
      btn.querySelector('div').style.background = '#76C043';
      btn.querySelector('div').style.color = '#0E1C42';
    } else if (i === selectedIdx && !opt.correct) {
      btn.style.borderColor = '#ff6b6b';
      btn.style.background = 'rgba(255,107,107,0.10)';
      btn.querySelector('div').style.background = '#ff6b6b';
      btn.querySelector('div').style.color = '#ffffff';
    } else {
      btn.style.opacity = '0.55';
    }
  });

  if (chosen.correct) {
    totalXP += POINTS_PER_CORRECT;
    correctCount++;
  }
  updateStatusBar();

  const fb = document.getElementById('feedback-zone');
  const color = chosen.correct ? '#76C043' : '#ff6b6b';
  const bgColor = chosen.correct ? 'rgba(118,192,67,0.10)' : 'rgba(255,107,107,0.08)';
  const label = chosen.correct ? '✅ CORRECT  ·  +' + POINTS_PER_CORRECT + ' XP' : '❌ NOT QUITE';
  fb.innerHTML = `
    <div style="background:${bgColor};border:1px solid ${color};border-left:4px solid ${color};border-radius:0 10px 10px 0;padding:16px 20px;margin-bottom:14px;">
      <div style="color:${color};font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.18em;margin-bottom:8px;">${label}</div>
      <div style="color:#e2e8f0;font-size:14px;line-height:1.6;">${chosen.why}</div>
    </div>
    <button id="next-btn" style="width:100%;background:linear-gradient(135deg,#55C8E8,#0E5568);border:none;border-radius:10px;padding:14px 18px;color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s ease;">
      ${currentIndex < QUESTIONS.length - 1 ? 'Next Puzzle →' : 'See Your Results →'}
    </button>
  `;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.addEventListener('mouseenter', () => { nextBtn.style.transform = 'translateY(-2px)'; nextBtn.style.boxShadow = '0 6px 20px rgba(85,200,232,0.4)'; });
  nextBtn.addEventListener('mouseleave', () => { nextBtn.style.transform = 'translateY(0)'; nextBtn.style.boxShadow = 'none'; });
  nextBtn.addEventListener('click', () => {
    currentIndex++;
    if (currentIndex < QUESTIONS.length) {
      renderQuestion();
    } else {
      renderResults();
    }
  });
}

function updateStatusBar() {
  document.getElementById('progress-text').textContent = `Question ${Math.min(currentIndex+1, QUESTIONS.length)} of ${QUESTIONS.length}`;
  const pct = ((answered ? currentIndex + 1 : currentIndex) / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('xp-text').textContent = totalXP;
}

function renderResults() {
  const maxXP = POINTS_PER_CORRECT * QUESTIONS.length;
  const pct = Math.round((totalXP / maxXP) * 100);
  let message, emoji, color;
  if (pct === 100) {
    message = "Perfect run! You can spot every Python data type and write spotless variable names.";
    emoji = "🏆"; color = "#C7922C";
  } else if (pct >= 80) {
    message = "Strong work — you've got the four core types and snake_case naming nailed.";
    emoji = "⭐"; color = "#76C043";
  } else if (pct >= 60) {
    message = "Solid progress. Reread the type definitions in Section 3 and run it again to lock it in.";
    emoji = "💪"; color = "#55C8E8";
  } else {
    message = "Don't sweat it — types take a second pass to click. Reread the Week 21 lesson and try again.";
    emoji = "📚"; color = "#67308F";
  }

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-text').textContent = 'Complete!';

  document.getElementById('question-container').innerHTML = `
    <div style="background:linear-gradient(135deg,#111122,#0E1C42);border:1px solid ${color};border-radius:14px;padding:36px 28px;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,0.5);">
      <div style="font-size:72px;margin-bottom:12px;">${emoji}</div>
      <div style="color:${color};font-family:'Wix Madefor Display',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.24em;text-transform:uppercase;margin-bottom:10px;">Activity Complete</div>
      <h2 style="font-family:'Wix Madefor Display',sans-serif;color:#ffffff;font-size:32px;font-weight:800;margin:0 0 8px;">${totalXP} / ${maxXP} XP</h2>
      <div style="color:#c8d6e8;font-size:16px;margin-bottom:6px;">${correctCount} of ${QUESTIONS.length} correct · ${pct}%</div>
      <p style="color:#e2e8f0;font-size:16px;line-height:1.55;max-width:520px;margin:16px auto 28px;">${message}</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button id="retry-btn" style="background:linear-gradient(135deg,#55C8E8,#0E5568);border:none;border-radius:10px;padding:14px 26px;color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:14px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:transform 0.2s;">
          ↻ Try Again
        </button>
      </div>
    </div>
  `;

  document.getElementById('retry-btn').addEventListener('click', () => {
    currentIndex = 0; totalXP = 0; correctCount = 0;
    renderQuestion();
  });

  // Canvas grade passback via postMessage
  try {
    window.parent.postMessage({
      type: 'canvas-grade',
      score: totalXP,
      maxScore: maxXP,
      percent: pct,
      correctCount: correctCount,
      totalQuestions: QUESTIONS.length,
      activity: 'week-21-activity'
    }, '*');
  } catch (e) { /* no-op */ }
}

// Kick off
renderQuestion();
</script>

</body>
</html>
