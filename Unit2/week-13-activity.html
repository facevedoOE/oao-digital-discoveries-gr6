<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 13 Activity — Source Detective | Digital Discoveries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;600;700;800&family=Wix+Madefor+Text:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#0a0a14;font-family:'Wix Madefor Text',system-ui,sans-serif;color:#e2e8f0;line-height:1.6;min-height:100vh;">

<div id="app-root" style="max-width:820px;margin:0 auto;padding:20px;">

  <!-- HEADER -->
  <div style="background:#0E1C42;border-radius:14px;padding:20px 24px;margin-bottom:18px;border:1px solid #1e2a4a;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;">
      <div style="background:#F78F1E;color:#0E1C42;padding:5px 12px;border-radius:14px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:11px;letter-spacing:0.14em;">🎮 ACTIVITY</div>
      <div style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;">Unit 2 · Week 13 · SC.6.HS.1.2, 1.4</div>
    </div>
    <h1 style="font-family:'Wix Madefor Display',sans-serif;font-size:28px;font-weight:800;color:#ffffff;margin:0 0 6px;line-height:1.2;">Source Detective</h1>
    <p style="margin:0;color:#c8d6e8;font-size:14px;">10 challenges. Apply CRAAP, decode URLs, spot scams, and decide what to trust. Earn XP — retry as much as you want.</p>
  </div>

  <!-- PROGRESS + XP BAR -->
  <div id="status-bar" style="background:#111122;border:1px solid #1e2a4a;border-radius:12px;padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
    <div style="flex:1;min-width:220px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;">Progress</span>
        <span id="progress-text" style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:13px;font-weight:700;">Question 1 of 10</span>
      </div>
      <div style="background:#0a0a14;border-radius:10px;height:10px;overflow:hidden;">
        <div id="progress-fill" style="background:linear-gradient(90deg,#55C8E8,#76C043);height:100%;width:0%;transition:width 0.4s ease;"></div>
      </div>
    </div>
    <div style="background:linear-gradient(135deg,#C7922C,#8a6620);padding:8px 16px;border-radius:10px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:18px;">⚡</span>
      <span style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;">XP</span>
      <span id="xp-text" style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:18px;font-weight:800;">0</span>
    </div>
  </div>

  <!-- QUESTION CONTAINER -->
  <div id="question-container"></div>

  <!-- FOOTER NOTE -->
  <div style="text-align:center;color:#55687a;font-size:12px;margin-top:24px;padding:12px;">
    Digital Discoveries · Optima Academy Online · Course 0200021
  </div>

</div>

<script>
const QUESTIONS = [
  {
    id: 1,
    tag: 'CRAAP — Currency',
    tagColor: '#55C8E8',
    status: 'amber',
    icon: '📅',
    scenario: "You find a website article with NO publication date and NO \"last updated\" date. The topic is space exploration. Which CRAAP letter is raising a red flag?",
    options: [
      { text: 'C — Currency', correct: true, why: "Right! With no date, you can't tell if it's three weeks old or thirty years old. For a fast-changing topic like space, that's a serious problem." },
      { text: 'R — Relevance', correct: false, why: "Relevance is about whether the article fits your question — not when it was written." },
      { text: 'P — Purpose', correct: false, why: "Purpose is WHY the site exists. The missing date is a Currency issue." },
      { text: 'A — Accuracy', correct: false, why: "Accuracy would be about whether the FACTS are right. Missing dates is a Currency problem." }
    ]
  },
  {
    id: 2,
    tag: 'CRAAP — Authority',
    tagColor: '#67308F',
    status: 'red',
    icon: '👤',
    scenario: "An article making bold medical claims is signed only \"Admin\" — no real name, no credentials, no biography. Which CRAAP letter is most concerning?",
    options: [
      { text: 'C — Currency', correct: false, why: "Currency is about WHEN — there\'s no date issue mentioned here." },
      { text: 'A — Authority', correct: true, why: "Right! Real authors put their name and credentials on their work. \"Admin\" on a medical article is a major Authority red flag." },
      { text: 'R — Relevance', correct: false, why: "Relevance is about whether the article matches your question — not the author's identity." },
      { text: 'P — Purpose', correct: false, why: "Possible secondary issue, but the missing author name is most directly an AUTHORITY problem." }
    ]
  },
  {
    id: 3,
    tag: 'TLD Reading',
    tagColor: '#76C043',
    status: 'green',
    icon: '🔗',
    scenario: "Which top-level domain (TLD) is restricted ONLY to U.S. government agencies?",
    options: [
      { text: '.com', correct: false, why: "Anyone can register a .com — it's the most open TLD on the internet." },
      { text: '.org', correct: false, why: "Originally for non-profits, but now anyone can register .org. Don't assume trust from .org alone." },
      { text: '.gov', correct: true, why: "Right! Only U.S. government agencies can use .gov — like nasa.gov, usa.gov, weather.gov." },
      { text: '.edu', correct: false, why: ".edu is restricted, but to U.S. accredited SCHOOLS (universities and some K-12), not to the government." }
    ]
  },
  {
    id: 4,
    tag: 'TLD Trap',
    tagColor: '#C7922C',
    status: 'amber',
    icon: '⚠️',
    scenario: "A friend tells you \"It's a .org, so it must be trustworthy.\" Why is that thinking flawed?",
    options: [
      { text: '.org sites are always wrong', correct: false, why: "That's the opposite mistake. .org doesn't tell you if a site is right or wrong — only that it has the .org TLD." },
      { text: 'Anyone can register a .org now — the TLD is a clue, not a verdict', correct: true, why: "Right! .org started as the non-profit category, but today anyone can register one. Use CRAAP, not just the TLD." },
      { text: '.org sites can\'t exist on the modern internet', correct: false, why: "Plenty of .org sites exist. The point is they aren't automatically trustworthy." },
      { text: 'Only .com sites are real', correct: false, why: "Many real, valuable websites use .org, .edu, .gov, and other TLDs." }
    ]
  },
  {
    id: 5,
    tag: 'Lateral Reading',
    tagColor: '#55C8E8',
    status: 'blue',
    icon: '↔️',
    scenario: "What's the BEST first move when you're not sure if a website is trustworthy?",
    options: [
      { text: 'Stay on the page and read more carefully — the answer must be there', correct: false, why: "That's exactly what fact-checkers DON'T do. Suspicious sites can look polished from the inside." },
      { text: 'Open a new tab and search what other trusted sources say about that website', correct: true, why: "Right! That's lateral reading — leave the page and check what the rest of the web says about the source." },
      { text: 'Trust it because the website looks fancy and professional', correct: false, why: "Looks are easy to fake. Many scam sites look gorgeous." },
      { text: 'Forward the page to friends and ask their opinion', correct: false, why: "Friends don't necessarily know more than you. Look for trusted, professional sources via lateral reading instead." }
    ]
  },
  {
    id: 6,
    tag: 'Spot the Scam',
    tagColor: '#ff6b6b',
    status: 'red',
    icon: '🎁',
    scenario: "A site says: \"Click here to claim FREE 10,000 V-Bucks! Just enter your Fortnite username and password!\" What is this?",
    options: [
      { text: 'A real Epic Games promotion', correct: false, why: "Real game companies NEVER give away currency for free, and they NEVER ask for your password to do it." },
      { text: 'A fake giveaway designed to steal your account', correct: true, why: "Right! Fake \"free currency\" sites are a textbook scam. Close the page, never enter your password." },
      { text: 'Probably real if the site has a logo', correct: false, why: "Logos are easy to copy. The give-us-your-password ask is the dead giveaway." },
      { text: 'Fine to try, since you can change your password later', correct: false, why: "By the time you change it, the scammer is already in. Don't enter the password at all." }
    ]
  },
  {
    id: 7,
    tag: 'Clickbait',
    tagColor: '#F78F1E',
    status: 'amber',
    icon: '🎣',
    scenario: "Which headline is a classic example of CLICKBAIT?",
    options: [
      { text: '\"NASA Reports New Findings on Mars Surface\"', correct: false, why: "That's a normal informative headline — clear, specific, and based on a real source." },
      { text: '\"Florida Sees Record Rainfall in March\"', correct: false, why: "Specific, factual, low-drama — the opposite of clickbait." },
      { text: '\"You Won\'t BELIEVE What This Doctor Says — Number 7 SHOCKED Me!\"', correct: true, why: "Right! All-caps shouting, vague \"this doctor,\" promised shock, and a numbered list. Classic clickbait." },
      { text: '\"Local Library Adds 200 New Books\"', correct: false, why: "Specific, accurate, no exaggeration — that's a normal headline." }
    ]
  },
  {
    id: 8,
    tag: 'Fake Tech Support',
    tagColor: '#67308F',
    status: 'red',
    icon: '🛠️',
    scenario: "A pop-up appears yelling \"YOUR COMPUTER IS INFECTED — call 1-800-FAKE-NOW immediately!\" What's the right move?",
    options: [
      { text: 'Call the number — better safe than sorry', correct: false, why: "Real Microsoft and Apple NEVER show pop-ups asking you to call a phone number. The pop-up itself is the scam." },
      { text: 'Close the pop-up. Don\'t call. If it won\'t close, force-quit the browser and tell a trusted adult.', correct: true, why: "Right! Fake tech support pop-ups are common scams. Real OS makers never demand calls through browser pop-ups." },
      { text: 'Click through the pop-up to see what software it offers', correct: false, why: "Clicking through often installs malware or opens a paid \"tech support\" call where strangers control your computer." },
      { text: 'Pay any fee they ask, but only with a gift card', correct: false, why: "Gift-card payments to \"tech support\" is a flashing-red sign of a scam. Real companies don't take gift cards." }
    ]
  },
  {
    id: 9,
    tag: 'Best Source',
    tagColor: '#76C043',
    status: 'green',
    icon: '🏆',
    scenario: "You're writing a 6th-grade report on the history of NASA. Which is the BEST primary source?",
    options: [
      { text: 'Anonymous fan blog with no dates and lots of opinions', correct: false, why: "No author, no dates, no citations — that fails most of CRAAP." },
      { text: 'nasa.gov — NASA\'s own .gov website', correct: true, why: "Right! .gov restricted to U.S. government, with strong authority on its own programs. NASA's history pages cite their own records." },
      { text: 'A random Pinterest board with cool space pictures', correct: false, why: "Pinterest images are usually re-shared without source info. Not citation-quality." },
      { text: 'A YouTube comment section', correct: false, why: "Random comments aren't sources at all. No author, no facts, no review." }
    ]
  },
  {
    id: 10,
    tag: 'Putting It Together',
    tagColor: '#C7922C',
    status: 'red',
    icon: '🧩',
    scenario: "You find a site claiming \"Scientists prove sleep is bad for you!\" The site is bestnewzz247.com (note the misspellings), no author, last updated 2007, full of giveaway pop-ups. Apply CRAAP — what's your verdict?",
    options: [
      { text: 'Trust it — the URL looks edgy, which is a sign of \"the truth\"', correct: false, why: "Edgy URLs and misspellings are warning signs, not trust signals. Don\'t cite this." },
      { text: 'Reject it — it fails almost every CRAAP letter (no author, old date, no sources, sketchy URL, unclear purpose)', correct: true, why: "Right! Authority (no author), Currency (2007), Accuracy (no citations), and Purpose (giveaways) all fail. Lateral reading would also reveal misspelled imitator domains. This is a textbook bad source." },
      { text: 'Trust it because the headline is exciting', correct: false, why: "Exciting claims need MORE scrutiny, not less. Real research on sleep says the opposite of this headline." },
      { text: 'Cite it in your report — passing on the news is part of being informed', correct: false, why: "Citing a bad source spreads misinformation. Find a .gov, .edu, or major news source instead." }
    ]
  }
];

const POINTS_PER_CORRECT = 10;
let currentIndex = 0;
let totalXP = 0;
let correctCount = 0;
let answered = false;

const STATUS_COLORS = {
  red:   '#ff6b6b',
  amber: '#F78F1E',
  green: '#76C043',
  blue:  '#55C8E8'
};

function renderQuestion() {
  const q = QUESTIONS[currentIndex];
  answered = false;
  updateStatusBar();

  const container = document.getElementById('question-container');
  container.innerHTML = `
    <div style="background:#111122;border:1px solid #1e2a4a;border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <div style="background:linear-gradient(135deg,#0E1C42,#1a2a5e);padding:20px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #1e2a4a;">
        <div style="width:12px;height:12px;border-radius:50%;background:${STATUS_COLORS[q.status]};box-shadow:0 0 12px ${STATUS_COLORS[q.status]};flex-shrink:0;"></div>
        <div style="background:${q.tagColor};color:#0E1C42;padding:4px 10px;border-radius:10px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;">${q.tag}</div>
        <div style="margin-left:auto;font-size:28px;">${q.icon}</div>
      </div>
      <div style="padding:24px;">
        <div style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:10px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;">Scenario ${q.id}</div>
        <p style="color:#ffffff;font-size:17px;line-height:1.55;margin:0 0 22px;">${q.scenario}</p>
        <div id="options-list" style="display:flex;flex-direction:column;gap:10px;"></div>
        <div id="feedback-zone" style="margin-top:18px;"></div>
      </div>
    </div>
  `;

  const list = document.getElementById('options-list');
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.setAttribute('data-idx', idx);
    btn.style.cssText = `
      background:#0a0a14;border:2px solid #1e2a4a;border-radius:10px;
      padding:14px 18px;color:#e2e8f0;font-family:inherit;font-size:15px;
      text-align:left;cursor:pointer;transition:all 0.2s ease;
      display:flex;gap:12px;align-items:flex-start;
    `;
    btn.innerHTML = `
      <div style="flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#1e2a4a;color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;">${String.fromCharCode(65+idx)}</div>
      <div style="flex:1;padding-top:4px;">${opt.text}</div>
    `;
    btn.addEventListener('mouseenter', () => {
      if (!answered) { btn.style.borderColor = '#55C8E8'; btn.style.background = '#111933'; }
    });
    btn.addEventListener('mouseleave', () => {
      if (!answered) { btn.style.borderColor = '#1e2a4a'; btn.style.background = '#0a0a14'; }
    });
    btn.addEventListener('click', () => handleAnswer(idx));
    list.appendChild(btn);
  });
}

function handleAnswer(selectedIdx) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[currentIndex];
  const chosen = q.options[selectedIdx];
  const buttons = document.querySelectorAll('#options-list button');

  buttons.forEach((btn, i) => {
    btn.style.cursor = 'default';
    btn.disabled = true;
    const opt = q.options[i];
    if (opt.correct) {
      btn.style.borderColor = '#76C043';
      btn.style.background = 'rgba(118,192,67,0.12)';
      btn.querySelector('div').style.background = '#76C043';
      btn.querySelector('div').style.color = '#0E1C42';
    } else if (i === selectedIdx && !opt.correct) {
      btn.style.borderColor = '#ff6b6b';
      btn.style.background = 'rgba(255,107,107,0.10)';
      btn.querySelector('div').style.background = '#ff6b6b';
      btn.querySelector('div').style.color = '#ffffff';
    } else {
      btn.style.opacity = '0.55';
    }
  });

  if (chosen.correct) {
    totalXP += POINTS_PER_CORRECT;
    correctCount++;
  }
  updateStatusBar();

  const fb = document.getElementById('feedback-zone');
  const color = chosen.correct ? '#76C043' : '#ff6b6b';
  const bgColor = chosen.correct ? 'rgba(118,192,67,0.10)' : 'rgba(255,107,107,0.08)';
  const label = chosen.correct ? '✅ CORRECT  ·  +' + POINTS_PER_CORRECT + ' XP' : '❌ NOT QUITE';
  fb.innerHTML = `
    <div style="background:${bgColor};border:1px solid ${color};border-left:4px solid ${color};border-radius:0 10px 10px 0;padding:16px 20px;margin-bottom:14px;">
      <div style="color:${color};font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.18em;margin-bottom:8px;">${label}</div>
      <div style="color:#e2e8f0;font-size:14px;line-height:1.6;">${chosen.why}</div>
    </div>
    <button id="next-btn" style="width:100%;background:linear-gradient(135deg,#55C8E8,#0E5568);border:none;border-radius:10px;padding:14px 18px;color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s ease;">
      ${currentIndex < QUESTIONS.length - 1 ? 'Next Scenario →' : 'See Your Results →'}
    </button>
  `;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.addEventListener('mouseenter', () => { nextBtn.style.transform = 'translateY(-2px)'; nextBtn.style.boxShadow = '0 6px 20px rgba(85,200,232,0.4)'; });
  nextBtn.addEventListener('mouseleave', () => { nextBtn.style.transform = 'translateY(0)'; nextBtn.style.boxShadow = 'none'; });
  nextBtn.addEventListener('click', () => {
    currentIndex++;
    if (currentIndex < QUESTIONS.length) {
      renderQuestion();
    } else {
      renderResults();
    }
  });
}

function updateStatusBar() {
  document.getElementById('progress-text').textContent = `Question ${Math.min(currentIndex+1, QUESTIONS.length)} of ${QUESTIONS.length}`;
  const pct = ((answered ? currentIndex + 1 : currentIndex) / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('xp-text').textContent = totalXP;
}

function renderResults() {
  const maxXP = POINTS_PER_CORRECT * QUESTIONS.length;
  const pct = Math.round((totalXP / maxXP) * 100);
  let message, emoji, color;
  if (pct === 100) {
    message = "Perfect run! You can size up any source like a real fact-checker.";
    emoji = "🏆"; color = "#C7922C";
  } else if (pct >= 80) {
    message = "Excellent work! You've got CRAAP, TLDs, lateral reading, and scam-spotting on lock.";
    emoji = "⭐"; color = "#76C043";
  } else if (pct >= 60) {
    message = "Good progress. Re-read the scenarios you missed — focus on the CRAAP letters and the TLD nuances.";
    emoji = "💪"; color = "#55C8E8";
  } else {
    message = "Keep going! Re-read the Week 13 lesson — especially the CRAAP test and the lateral-reading steps — then try again.";
    emoji = "📚"; color = "#67308F";
  }

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-text').textContent = 'Complete!';

  document.getElementById('question-container').innerHTML = `
    <div style="background:linear-gradient(135deg,#111122,#0E1C42);border:1px solid ${color};border-radius:14px;padding:36px 28px;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,0.5);">
      <div style="font-size:72px;margin-bottom:12px;">${emoji}</div>
      <div style="color:${color};font-family:'Wix Madefor Display',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.24em;text-transform:uppercase;margin-bottom:10px;">Activity Complete</div>
      <h2 style="font-family:'Wix Madefor Display',sans-serif;color:#ffffff;font-size:32px;font-weight:800;margin:0 0 8px;">${totalXP} / ${maxXP} XP</h2>
      <div style="color:#c8d6e8;font-size:16px;margin-bottom:6px;">${correctCount} of ${QUESTIONS.length} correct · ${pct}%</div>
      <p style="color:#e2e8f0;font-size:16px;line-height:1.55;max-width:520px;margin:16px auto 28px;">${message}</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button id="retry-btn" style="background:linear-gradient(135deg,#55C8E8,#0E5568);border:none;border-radius:10px;padding:14px 26px;color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:14px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:transform 0.2s;">
          ↻ Try Again
        </button>
      </div>
    </div>
  `;

  document.getElementById('retry-btn').addEventListener('click', () => {
    currentIndex = 0; totalXP = 0; correctCount = 0;
    renderQuestion();
  });

  try {
    window.parent.postMessage({
      type: 'canvas-grade',
      score: totalXP,
      maxScore: maxXP,
      percent: pct,
      correctCount: correctCount,
      totalQuestions: QUESTIONS.length,
      activity: 'week-13-activity'
    }, '*');
  } catch (e) { /* no-op */ }
}

renderQuestion();
</script>

</body>
</html>
