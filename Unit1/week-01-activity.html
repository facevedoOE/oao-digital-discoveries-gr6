<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 1 Activity — Pick the Right Channel | Digital Discoveries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;600;700;800&family=Wix+Madefor+Text:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#0a0a14;font-family:'Wix Madefor Text',system-ui,sans-serif;color:#e2e8f0;line-height:1.6;min-height:100vh;">

<div id="app-root" style="max-width:820px;margin:0 auto;padding:20px;">

  <!-- HEADER -->
  <div style="background:#0E1C42;border-radius:14px;padding:20px 24px;margin-bottom:18px;border:1px solid #1e2a4a;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px;">
      <div style="background:#F78F1E;color:#0E1C42;padding:5px 12px;border-radius:14px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:11px;letter-spacing:0.14em;">🎮 ACTIVITY</div>
      <div style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;">Unit 1 · Week 1 · SC.6.CC.1.1</div>
    </div>
    <h1 style="font-family:'Wix Madefor Display',sans-serif;font-size:28px;font-weight:800;color:#ffffff;margin:0 0 6px;line-height:1.2;">Pick the Right Channel</h1>
    <p style="margin:0;color:#c8d6e8;font-size:14px;">10 real-life scenarios. Pick the best digital tool for each job and earn XP. You can retry as many times as you want.</p>
  </div>

  <!-- PROGRESS + XP BAR -->
  <div id="status-bar" style="background:#111122;border:1px solid #1e2a4a;border-radius:12px;padding:14px 20px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
    <div style="flex:1;min-width:220px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;">Progress</span>
        <span id="progress-text" style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:13px;font-weight:700;">Question 1 of 10</span>
      </div>
      <div style="background:#0a0a14;border-radius:10px;height:10px;overflow:hidden;">
        <div id="progress-fill" style="background:linear-gradient(90deg,#55C8E8,#76C043);height:100%;width:0%;transition:width 0.4s ease;"></div>
      </div>
    </div>
    <div style="background:linear-gradient(135deg,#C7922C,#8a6620);padding:8px 16px;border-radius:10px;display:flex;align-items:center;gap:8px;">
      <span style="font-size:18px;">⚡</span>
      <span style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;">XP</span>
      <span id="xp-text" style="color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-size:18px;font-weight:800;">0</span>
    </div>
  </div>

  <!-- QUESTION CONTAINER -->
  <div id="question-container"></div>

  <!-- FOOTER NOTE -->
  <div style="text-align:center;color:#55687a;font-size:12px;margin-top:24px;padding:12px;">
    Digital Discoveries · Optima Academy Online · Course 0200021
  </div>

</div>

<script>
// ═════════════════════════════════════════════════════════════
// QUESTION BANK — 10 scenario-based items
// ═════════════════════════════════════════════════════════════
const QUESTIONS = [
  {
    id: 1,
    tag: 'Teacher Request',
    tagColor: '#55C8E8',
    status: 'blue',
    icon: '📧',
    scenario: "You need to ask your science teacher a detailed question about an upcoming project. You want a thoughtful answer and a record you can refer back to.",
    options: [
      { text: 'Quick text message with abbreviations ("hey whats the proj???")', correct: false, why: "Too informal for a teacher — and texting classroom questions outside approved channels isn't appropriate." },
      { text: 'A clear, polite email with a subject line and specific question', correct: true, why: "Email is asynchronous, professional, and leaves a record you can reread — exactly right for a detailed teacher question." },
      { text: 'A surprise video call at 9 p.m.', correct: false, why: "Video calls are synchronous — your teacher may not be available. Time-of-day also matters!" },
      { text: 'A reaction emoji on the class announcement', correct: false, why: "Emojis don't carry a full question. The teacher won't know what you're asking." }
    ]
  },
  {
    id: 2,
    tag: 'Group Project',
    tagColor: '#76C043',
    status: 'green',
    icon: '📄',
    scenario: "You and three classmates are co-writing a short research paper. Everyone needs to contribute, see each other's edits, and leave comments — over several days.",
    options: [
      { text: 'Mail each other printed drafts', correct: false, why: "Way too slow for a digital school project." },
      { text: 'Take turns screen-sharing on a video call every day', correct: false, why: "Exhausting and requires everyone online at the same time. A shared doc handles this better." },
      { text: 'A shared Google Doc where everyone edits and comments', correct: true, why: "A collaborative document is asynchronous, tracks edits, and lets people comment — perfect for multi-day group work." },
      { text: 'Start a group text chain and paste paragraphs one by one', correct: false, why: "Texting isn't built for long documents — you'll lose version history and formatting." }
    ]
  },
  {
    id: 3,
    tag: 'Quick Plans',
    tagColor: '#F78F1E',
    status: 'amber',
    icon: '💬',
    scenario: "Your friend who lives down the street wants to know if you're free to shoot hoops this afternoon. You need to answer fast.",
    options: [
      { text: 'A formal email with a subject line', correct: false, why: "Overkill — email is for formal, detailed, or school-related messages." },
      { text: 'A quick, casual text message', correct: true, why: "For a fast, low-stakes message to a close friend, instant messaging is ideal — quick, casual, personal." },
      { text: 'Post the question on Canvas Discussions', correct: false, why: "Canvas Discussions are for classmates and academic conversations, not personal plans." },
      { text: 'Record a 3-minute video message', correct: false, why: "Too much effort for a yes/no question. Keep it concise." }
    ]
  },
  {
    id: 4,
    tag: 'Class Discussion',
    tagColor: '#67308F',
    status: 'blue',
    icon: '🗣️',
    scenario: "Your ELA teacher wants every student to share their favorite moment from a novel, read other students' responses, and reply to at least two classmates over the week.",
    options: [
      { text: 'Canvas Discussions board', correct: true, why: "Discussion boards are asynchronous and perfect for whole-class, thoughtful written exchanges that build on each other." },
      { text: 'Zoom call where everyone speaks in turn', correct: false, why: "Synchronous calls require perfect scheduling — a class of 20+ students would take forever, and shy students might not speak up." },
      { text: 'Private texts to the teacher', correct: false, why: "The whole class is supposed to see everyone's answers — private texts defeat the purpose." },
      { text: 'A shared Google Doc where everyone types their answer into one page', correct: false, why: "Possible — but discussion boards are purpose-built for back-and-forth replies and threading. A shared Doc gets messy quickly." }
    ]
  },
  {
    id: 5,
    tag: 'Tutoring',
    tagColor: '#55C8E8',
    status: 'green',
    icon: '🎥',
    scenario: "You're stuck on a math problem and your online tutor wants to work through it with you, step by step, showing you how to draw it out.",
    options: [
      { text: 'Email a photo of the problem', correct: false, why: "A single photo can't match the back-and-forth of solving a problem together in real time." },
      { text: 'Post the problem on a class discussion board and wait', correct: false, why: "A discussion board is asynchronous — you won't get real-time help, and classmates aren't your tutor." },
      { text: 'A live video call where you share your screen', correct: true, why: "Video calls are synchronous and let your tutor see, explain, and respond instantly — ideal for one-on-one tutoring." },
      { text: 'Text the tutor a question mark', correct: false, why: "Not clear, not polite, and not enough information for them to help you." }
    ]
  },
  {
    id: 6,
    tag: 'Under the Hood',
    tagColor: '#F78F1E',
    status: 'blue',
    icon: '📦',
    scenario: "A friend asks: 'How does my text message get to someone three states away in less than a second?' What's the MOST accurate explanation?",
    options: [
      { text: 'Messages travel as one big chunk through the air', correct: false, why: "Messages don't travel as one chunk — they're split into packets." },
      { text: 'Messages are broken into data packets that travel through routers and are reassembled at the destination', correct: true, why: "Right! Packets can even take different paths and arrive out of order — your device puts them back together." },
      { text: 'The phone company reads your message and retypes it', correct: false, why: "No humans are retyping! The network routes packets automatically." },
      { text: 'The message is stored in a cloud the entire time', correct: false, why: "Some messages pass through servers briefly, but they're still delivered as packets through routers." }
    ]
  },
  {
    id: 7,
    tag: 'Synchronous or Async?',
    tagColor: '#76C043',
    status: 'amber',
    icon: '⏱️',
    scenario: "Which of these is the BEST example of ASYNCHRONOUS communication?",
    options: [
      { text: 'A live Zoom class with 20 students', correct: false, why: "Zoom is synchronous — everyone is present at the same time." },
      { text: 'A voice chat during an online game', correct: false, why: "Voice chat is synchronous — you both speak in real time." },
      { text: 'An email sent Tuesday night, read Wednesday morning', correct: true, why: "Email is classic asynchronous communication — sender and receiver are not online at the same time." },
      { text: 'A FaceTime call with your grandparent', correct: false, why: "FaceTime is synchronous — both people are on the call together." }
    ]
  },
  {
    id: 8,
    tag: 'Tone Check',
    tagColor: '#67308F',
    status: 'red',
    icon: '🎵',
    scenario: "Your teacher emails asking you to explain why your assignment is late. Which reply has the BEST tone?",
    options: [
      { text: '"whatever, ill turn it in soon"', correct: false, why: "Too casual and dismissive — this tone is disrespectful in a school email." },
      { text: '"I\'m so so so so sorry I\'m the worst student ever please don\'t fail me!!!"', correct: false, why: "Overly dramatic — this tone is not clear or professional and doesn't explain the situation." },
      { text: '"I\'m sorry for the delay. My internet was down last night, so I will submit the assignment by 5 p.m. today. Thank you for your patience."', correct: true, why: "Clear, concise, respectful, and specific — this tone matches a formal teacher-student conversation." },
      { text: 'No reply — just turn it in whenever', correct: false, why: "Ignoring a teacher's question is disrespectful. Communication requires a response." }
    ]
  },
  {
    id: 9,
    tag: 'Network Know-How',
    tagColor: '#55C8E8',
    status: 'blue',
    icon: '🌐',
    scenario: "What role does a ROUTER play in digital communication?",
    options: [
      { text: 'It writes the messages for you', correct: false, why: "Routers don't write messages — they direct traffic." },
      { text: 'It stores all your photos permanently', correct: false, why: "That's the job of storage servers or the cloud, not a router." },
      { text: 'It directs data packets along the correct path to their destination', correct: true, why: "Exactly — a router is like a digital traffic cop, reading each packet's address and sending it the fastest way." },
      { text: 'It translates messages into different languages', correct: false, why: "That's what translation apps do. Routers don't read the contents of your message." }
    ]
  },
  {
    id: 10,
    tag: 'Putting It Together',
    tagColor: '#C7922C',
    status: 'green',
    icon: '🧠',
    scenario: "Your principal asks every 6th grader to submit a SHORT personal reflection (not shared with classmates) about their first week of school. Which platform makes the MOST sense?",
    options: [
      { text: 'A public social media post', correct: false, why: "The reflection should NOT be shared with classmates — a public post is the opposite of private." },
      { text: 'A private email or Canvas Inbox message to the principal', correct: true, why: "Email and Canvas Inbox deliver a written reflection privately — asynchronous, direct, and keeps a record." },
      { text: 'A discussion board post the whole grade can see', correct: false, why: "Discussion boards are public to the class — not appropriate for private reflections." },
      { text: 'Shout it through the hallway', correct: false, why: "Not digital, not private, and not a good idea!" }
    ]
  }
];

// ═════════════════════════════════════════════════════════════
// STATE
// ═════════════════════════════════════════════════════════════
const POINTS_PER_CORRECT = 10;
let currentIndex = 0;
let totalXP = 0;
let correctCount = 0;
let answered = false;

// ═════════════════════════════════════════════════════════════
// RENDERING
// ═════════════════════════════════════════════════════════════
const STATUS_COLORS = {
  red:   '#ff6b6b',
  amber: '#F78F1E',
  green: '#76C043',
  blue:  '#55C8E8'
};

function renderQuestion() {
  const q = QUESTIONS[currentIndex];
  answered = false;
  updateStatusBar();

  const container = document.getElementById('question-container');
  container.innerHTML = `
    <div style="background:#111122;border:1px solid #1e2a4a;border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
      <div style="background:linear-gradient(135deg,#0E1C42,#1a2a5e);padding:20px 24px;display:flex;align-items:center;gap:14px;border-bottom:1px solid #1e2a4a;">
        <div style="width:12px;height:12px;border-radius:50%;background:${STATUS_COLORS[q.status]};box-shadow:0 0 12px ${STATUS_COLORS[q.status]};flex-shrink:0;"></div>
        <div style="background:${q.tagColor};color:#0E1C42;padding:4px 10px;border-radius:10px;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;">${q.tag}</div>
        <div style="margin-left:auto;font-size:28px;">${q.icon}</div>
      </div>
      <div style="padding:24px;">
        <div style="color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-size:10px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;">Scenario ${q.id}</div>
        <p style="color:#ffffff;font-size:17px;line-height:1.55;margin:0 0 22px;">${q.scenario}</p>
        <div id="options-list" style="display:flex;flex-direction:column;gap:10px;"></div>
        <div id="feedback-zone" style="margin-top:18px;"></div>
      </div>
    </div>
  `;

  const list = document.getElementById('options-list');
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.setAttribute('data-idx', idx);
    btn.style.cssText = `
      background:#0a0a14;border:2px solid #1e2a4a;border-radius:10px;
      padding:14px 18px;color:#e2e8f0;font-family:inherit;font-size:15px;
      text-align:left;cursor:pointer;transition:all 0.2s ease;
      display:flex;gap:12px;align-items:flex-start;
    `;
    btn.innerHTML = `
      <div style="flex-shrink:0;width:28px;height:28px;border-radius:50%;background:#1e2a4a;color:#55C8E8;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;">${String.fromCharCode(65+idx)}</div>
      <div style="flex:1;padding-top:4px;">${opt.text}</div>
    `;
    btn.addEventListener('mouseenter', () => {
      if (!answered) { btn.style.borderColor = '#55C8E8'; btn.style.background = '#111933'; }
    });
    btn.addEventListener('mouseleave', () => {
      if (!answered) { btn.style.borderColor = '#1e2a4a'; btn.style.background = '#0a0a14'; }
    });
    btn.addEventListener('click', () => handleAnswer(idx));
    list.appendChild(btn);
  });
}

function handleAnswer(selectedIdx) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[currentIndex];
  const chosen = q.options[selectedIdx];
  const buttons = document.querySelectorAll('#options-list button');

  buttons.forEach((btn, i) => {
    btn.style.cursor = 'default';
    btn.disabled = true;
    const opt = q.options[i];
    if (opt.correct) {
      btn.style.borderColor = '#76C043';
      btn.style.background = 'rgba(118,192,67,0.12)';
      btn.querySelector('div').style.background = '#76C043';
      btn.querySelector('div').style.color = '#0E1C42';
    } else if (i === selectedIdx && !opt.correct) {
      btn.style.borderColor = '#ff6b6b';
      btn.style.background = 'rgba(255,107,107,0.10)';
      btn.querySelector('div').style.background = '#ff6b6b';
      btn.querySelector('div').style.color = '#ffffff';
    } else {
      btn.style.opacity = '0.55';
    }
  });

  if (chosen.correct) {
    totalXP += POINTS_PER_CORRECT;
    correctCount++;
  }
  updateStatusBar();

  const fb = document.getElementById('feedback-zone');
  const color = chosen.correct ? '#76C043' : '#ff6b6b';
  const bgColor = chosen.correct ? 'rgba(118,192,67,0.10)' : 'rgba(255,107,107,0.08)';
  const label = chosen.correct ? '✅ CORRECT  ·  +' + POINTS_PER_CORRECT + ' XP' : '❌ NOT QUITE';
  fb.innerHTML = `
    <div style="background:${bgColor};border:1px solid ${color};border-left:4px solid ${color};border-radius:0 10px 10px 0;padding:16px 20px;margin-bottom:14px;">
      <div style="color:${color};font-family:'Wix Madefor Display',sans-serif;font-size:11px;font-weight:800;letter-spacing:0.18em;margin-bottom:8px;">${label}</div>
      <div style="color:#e2e8f0;font-size:14px;line-height:1.6;">${chosen.why}</div>
    </div>
    <button id="next-btn" style="width:100%;background:linear-gradient(135deg,#55C8E8,#0E5568);border:none;border-radius:10px;padding:14px 18px;color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:15px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.2s ease;">
      ${currentIndex < QUESTIONS.length - 1 ? 'Next Scenario →' : 'See Your Results →'}
    </button>
  `;

  const nextBtn = document.getElementById('next-btn');
  nextBtn.addEventListener('mouseenter', () => { nextBtn.style.transform = 'translateY(-2px)'; nextBtn.style.boxShadow = '0 6px 20px rgba(85,200,232,0.4)'; });
  nextBtn.addEventListener('mouseleave', () => { nextBtn.style.transform = 'translateY(0)'; nextBtn.style.boxShadow = 'none'; });
  nextBtn.addEventListener('click', () => {
    currentIndex++;
    if (currentIndex < QUESTIONS.length) {
      renderQuestion();
    } else {
      renderResults();
    }
  });
}

function updateStatusBar() {
  document.getElementById('progress-text').textContent = `Question ${Math.min(currentIndex+1, QUESTIONS.length)} of ${QUESTIONS.length}`;
  const pct = ((answered ? currentIndex + 1 : currentIndex) / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('xp-text').textContent = totalXP;
}

function renderResults() {
  const maxXP = POINTS_PER_CORRECT * QUESTIONS.length;
  const pct = Math.round((totalXP / maxXP) * 100);
  let message, emoji, color;
  if (pct === 100) {
    message = "A perfect digital communicator! You can match any message to the right channel.";
    emoji = "🏆"; color = "#C7922C";
  } else if (pct >= 80) {
    message = "Excellent work! You understand how to choose the right tool for the right message.";
    emoji = "⭐"; color = "#76C043";
  } else if (pct >= 60) {
    message = "Good progress. Review the scenarios you missed and try again to level up.";
    emoji = "💪"; color = "#55C8E8";
  } else {
    message = "Keep going! Re-read the Week 1 lesson and try again — you've got this.";
    emoji = "📚"; color = "#67308F";
  }

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-text').textContent = 'Complete!';

  document.getElementById('question-container').innerHTML = `
    <div style="background:linear-gradient(135deg,#111122,#0E1C42);border:1px solid ${color};border-radius:14px;padding:36px 28px;text-align:center;box-shadow:0 12px 48px rgba(0,0,0,0.5);">
      <div style="font-size:72px;margin-bottom:12px;">${emoji}</div>
      <div style="color:${color};font-family:'Wix Madefor Display',sans-serif;font-size:12px;font-weight:800;letter-spacing:0.24em;text-transform:uppercase;margin-bottom:10px;">Activity Complete</div>
      <h2 style="font-family:'Wix Madefor Display',sans-serif;color:#ffffff;font-size:32px;font-weight:800;margin:0 0 8px;">${totalXP} / ${maxXP} XP</h2>
      <div style="color:#c8d6e8;font-size:16px;margin-bottom:6px;">${correctCount} of ${QUESTIONS.length} correct · ${pct}%</div>
      <p style="color:#e2e8f0;font-size:16px;line-height:1.55;max-width:520px;margin:16px auto 28px;">${message}</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button id="retry-btn" style="background:linear-gradient(135deg,#55C8E8,#0E5568);border:none;border-radius:10px;padding:14px 26px;color:#ffffff;font-family:'Wix Madefor Display',sans-serif;font-weight:800;font-size:14px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:transform 0.2s;">
          ↻ Try Again
        </button>
      </div>
    </div>
  `;

  document.getElementById('retry-btn').addEventListener('click', () => {
    currentIndex = 0; totalXP = 0; correctCount = 0;
    renderQuestion();
  });

  // Canvas grade passback via postMessage
  try {
    window.parent.postMessage({
      type: 'canvas-grade',
      score: totalXP,
      maxScore: maxXP,
      percent: pct,
      correctCount: correctCount,
      totalQuestions: QUESTIONS.length,
      activity: 'week-01-activity'
    }, '*');
  } catch (e) { /* no-op */ }
}

// Kick off
renderQuestion();
</script>

</body>
</html>
